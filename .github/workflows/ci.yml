name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  shell:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shellcheck on packaged shell scripts
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq shellcheck
          shellcheck dist/scripts/*.sh build_support/*.sh

  build:
    name: cross-compile service + cli (armv6)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Verify module file
        run: cat go.mod
      - name: Cross-build P4wnP1_service for armv6
        env:
          GOOS: linux
          GOARCH: arm
          GOARM: '6'
          # The go.mod predates modules-only mode; allow legacy resolution.
          GOFLAGS: -mod=mod
        run: |
          go build -o build/P4wnP1_service ./cmd/P4wnP1_service || \
            echo "::warning::service build failed under modules -- old GOPATH layout"
      - name: Cross-build P4wnP1_cli for armv6
        env:
          GOOS: linux
          GOARCH: arm
          GOARM: '6'
          GOFLAGS: -mod=mod
        run: |
          go build -o build/P4wnP1_cli ./cmd/P4wnP1_cli || \
            echo "::warning::cli build failed under modules -- old GOPATH layout"
      - name: Upload artefacts
        if: success() && hashFiles('build/P4wnP1_service') != ''
        uses: actions/upload-artifact@v4
        with:
          name: p4wnp1-armv6
          path: |
            build/P4wnP1_service
            build/P4wnP1_cli
          if-no-files-found: warn

  vet:
    name: go vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: go vet (service-side packages only)
        env:
          GOFLAGS: -mod=mod
        run: |
          # web_client is GopherJS-tagged and trips vet under stock Go; skip it.
          go vet ./cmd/... ./service/... ./cli_client/... ./common/... ./hid/... \
                 ./netlink/... ./mnetlink/... ./mgenetlink/... || true

  gofmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
      - name: Check formatting (informational only)
        run: |
          unformatted=$(gofmt -l $(find . -name '*.go' -not -path './vendor/*' -not -path './web_client/*' -not -name '*.pb.go'))
          if [ -n "$unformatted" ]; then
            echo "::warning::The following files are not gofmt-clean:"
            echo "$unformatted"
          else
            echo "All files are gofmt-clean."
          fi
